<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#iconGradient)"/>

  <g transform="translate(136, 160)" filter="url(#softShadow)">
    
    <path d="M40,0 C40,-60 120,-60 120,0" 
          stroke="#8B5CF6" 
          stroke-width="18" 
          stroke-linecap="round" 
          fill="none"/>

    <path d="M10,0 H150 L175,220 H-15 L10,0 Z" fill="white" />
    
    <text x="80" y="145" 
          font-family="Arial, sans-serif" 
          font-weight="bold" 
          font-size="110" 
          fill="#14B8A6" 
          text-anchor="middle">T</text>
  </g>
</svg>
