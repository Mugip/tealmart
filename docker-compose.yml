version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tealmart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tealmart
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: tealmart
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tealmart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tealmart-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tealmart:${DB_PASSWORD:-changeme}@postgres:5432/tealmart
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      INGESTION_API_KEY: ${INGESTION_API_KEY}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python Ingestion Service
  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: tealmart-ingestion
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tealmart:${DB_PASSWORD:-changeme}@postgres:5432/tealmart
      INGESTION_API_KEY: ${INGESTION_API_KEY}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
    driver: local
