name: Daily Product Ingestion

on:
  schedule:
    - cron: "40 2 * * *"   # 02:40 UTC every day
  workflow_dispatch:
    inputs:
      force_day:
        description: "Force a specific day (1–13). Leave blank to use auto-rotation."
        required: false
        default: ""

jobs:
  ingest-products:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────
      # Determine which day of the 13-day cycle we are on.
      # We use the Unix epoch day number modulo 13 so the cycle
      # restarts automatically and is consistent across runners.
      # ─────────────────────────────────────────────────────────────
      - name: Determine cycle day
        id: cycle
        run: |
          if [ -n "${{ github.event.inputs.force_day }}" ]; then
            DAY="${{ github.event.inputs.force_day }}"
            echo "Manual override: day $DAY"
          else
            EPOCH_DAYS=$(( $(date +%s) / 86400 ))
            DAY=$(( (EPOCH_DAYS % 13) + 1 ))
            echo "Epoch days: $EPOCH_DAYS → cycle day $DAY"
          fi
          echo "day=$DAY" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────────────────────
      # Run ingestion for today's category
      # Each keyword posts count=20 (one page = 20 products)
      # 50 keywords × 20 products = 1000 products max per day
      # ─────────────────────────────────────────────────────────────
      - name: Ingest today's category
        env:
          API: "https://tealmart.vercel.app/api/ingest"
          KEY: ${{ secrets.INGESTION_API_KEY }}
          DAY: ${{ steps.cycle.outputs.day }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  TealMart Ingestion — Cycle Day $DAY / 13"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          ingest() {
            local keyword="$1"
            echo ""
            echo "▶ Ingesting: $keyword"
            RESPONSE=$(curl -s -X POST "$API" \
              -H "Content-Type: application/json" \
              -H "x-api-key: $KEY" \
              -d "{\"count\":20,\"keyword\":\"$keyword\"}")
            echo "$RESPONSE" | grep -o '"created":[0-9]*\|"updated":[0-9]*\|"skipped":[0-9]*\|"error":"[^"]*"' || echo "$RESPONSE"
            sleep 4
          }

          case "$DAY" in

            # ──────────────────────────────────────────
            # DAY 1 — Women's Clothing (43 keywords)
            # ──────────────────────────────────────────
            1)
              echo "📂 Category: Women's Clothing"
              ingest "women blouse"
              ingest "women shirt long sleeve"
              ingest "women shirt short sleeve"
              ingest "women hoodie sweatshirt"
              ingest "women sweater"
              ingest "women cardigan"
              ingest "women tank top cami"
              ingest "women jumpsuit"
              ingest "women romper"
              ingest "women dress casual"
              ingest "women dress evening"
              ingest "women wedding dress"
              ingest "women bridesmaid dress"
              ingest "women prom dress"
              ingest "women leggings"
              ingest "women jeans"
              ingest "women shorts"
              ingest "women pants"
              ingest "women wide leg pants"
              ingest "women skirt"
              ingest "women blazer"
              ingest "women jacket"
              ingest "women trench coat"
              ingest "women padded jacket"
              ingest "women leather jacket"
              ingest "women fur coat"
              ingest "women wool coat"
              ingest "women lingerie"
              ingest "women sleepwear pajamas"
              ingest "women swimwear bikini"
              ingest "women sportswear"
              ingest "women scarf wrap"
              ingest "women belt"
              ingest "women gloves"
              ingest "women hat cap"
              ingest "women socks"
              ingest "women sunglasses eyewear"
              ingest "women face mask fashion"
              ingest "couple matching outfits"
              ingest "women cocktail dress"
              ingest "women bodysuit"
              ingest "women crop top"
              ingest "women maxi dress"
              ;;

            # ──────────────────────────────────────────
            # DAY 2 — Men's Clothing (24 keywords)
            # ──────────────────────────────────────────
            2)
              echo "📂 Category: Men's Clothing"
              ingest "men t-shirt"
              ingest "men polo shirt"
              ingest "men dress shirt"
              ingest "men hoodie"
              ingest "men sweatshirt"
              ingest "men sweater"
              ingest "men jacket"
              ingest "men blazer"
              ingest "men suit"
              ingest "men jeans"
              ingest "men trousers"
              ingest "men shorts"
              ingest "men jogger pants"
              ingest "men tracksuit"
              ingest "men coat"
              ingest "men puffer jacket"
              ingest "men underwear"
